<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calendar Weather Settings</title>
    <link rel="stylesheet" href="styles/popup.css">
</head>

<body>
    <div class="header">
        <div class="header-title">Calendar Weather</div>
        <div class="header-subtitle">Weather forecast for Google Calendar</div>
    </div>

    <div class="content">
        <div class="field-group">
            <label for="apiKey">API Key</label>
            <div class="input-with-toggle">
                <input type="password" id="apiKey" placeholder="Enter your OpenWeather API key" autocomplete="off">
                <button type="button" id="toggleApiKey" class="input-toggle-btn" aria-label="Show API key" aria-pressed="false">Show</button>
            </div>
        </div>

        <div class="field-group">
            <label for="city">City</label>
            <input type="text" id="city" placeholder="e.g. London, New York">
        </div>

        <div class="field-group">
            <label for="unit">Temperature Unit</label>
            <select id="unit">
                <option value="metric">Celsius (°C)</option>
                <option value="imperial">Fahrenheit (°F)</option>
            </select>
        </div>

        <div class="toggle-row">
            <label for="seaWeather">Sea Weather</label>
            <div class="toggle-switch">
                <input type="checkbox" id="seaWeather">
                <span class="toggle-slider"></span>
            </div>
        </div>

        <div class="actions">
            <button class="btn btn-primary" id="save">Save Settings</button>
            <button class="btn btn-secondary" id="findApiKey">Get an API Key</button>
        </div>

        <span id="statusMessage" class="status-message"></span>
    </div>

    <script src="scripts/popup.js"></script>
</body>
</html>
